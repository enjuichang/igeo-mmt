name: Sync Supabase question bank

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_PROJECT_ID: jttwfjmyyrerzjpmdcjb
      SUPABASE_URL: https://jttwfjmyyrerzjpmdcjb.supabase.co
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_SECRET_KEY SUPABASE_PUBLISHABLE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Link Supabase project
        run: npx --no-install supabase link --project-ref "${SUPABASE_PROJECT_ID}"

      - name: Apply database migrations
        run: npx --no-install supabase db push --linked --yes --dns-resolver https

      - name: Seed published question bank
        run: npm run supabase:seed

      - name: Verify public database and RLS
        run: npm run deploy:check
